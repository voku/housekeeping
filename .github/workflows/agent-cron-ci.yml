name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  qa:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          coverage: none
      - name: Clear Composer auth
        run: rm -f "$HOME/.composer/auth.json" "$HOME/.config/composer/auth.json"
      - run: composer install --no-interaction --prefer-dist --no-progress
      - run: composer analyse
      - run: composer test

  provider-cli-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Install coding-agent CLIs
        run: |
          npm install -g --no-audit --no-fund --no-progress \
            @google/gemini-cli@0.41.2 \
            @openai/codex@0.130.0 \
            @anthropic-ai/claude-code@2.1.138 \
            @github/copilot@1.0.44
          curl -fsSL https://opencode.ai/install | bash -s -- --no-modify-path
          echo "$HOME/.opencode/bin" >> "$GITHUB_PATH"
      - run: bin/provider-cli-smoke

  ai-slop:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          coverage: xdebug
      - name: Clear Composer auth
        run: rm -f "$HOME/.composer/auth.json" "$HOME/.config/composer/auth.json"
      - run: composer install --no-interaction --prefer-dist --no-progress
      - run: composer analyse
      - run: composer install-slop-scan
      - run: php bin/agent-cron housekeeping:run --task=slop:scan
      - run: composer install-infection
      - run: XDEBUG_MODE=coverage vendor/bin/phpunit --coverage-xml=build/coverage/coverage-xml --log-junit=build/coverage/junit.xml
      - name: Determine Infection diff base
        id: infection-base
        env:
          PR_BASE_SHA: ${{ github.event.pull_request.base.sha }}
          PUSH_BEFORE_SHA: ${{ github.event.before }}
        run: |
          zero_sha='0000000000000000000000000000000000000000'
          base_sha="${PR_BASE_SHA:-$PUSH_BEFORE_SHA}"
          if [ -z "$base_sha" ] || [ "$base_sha" = "$zero_sha" ]; then
            base_sha="$(git rev-parse HEAD^ 2>/dev/null || git rev-list --max-parents=0 HEAD)"
          fi
          echo "sha=$base_sha" >> "$GITHUB_OUTPUT"
      - run: php tools/infection.phar --configuration=infection.json5 --skip-initial-tests --coverage=build/coverage --git-diff-filter=AM --git-diff-base=${{ steps.infection-base.outputs.sha }} --min-msi=90 --min-covered-msi=90 --ignore-msi-with-no-mutations --no-progress --no-interaction
